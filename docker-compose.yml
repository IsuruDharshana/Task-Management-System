services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - apps/server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - server
    ports:
      - "5173:80"
